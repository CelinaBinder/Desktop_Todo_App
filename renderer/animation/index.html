<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Startup Animation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scene">
    <div class="rig-wrapper" id="rigWrapper">

      <svg class="list-svg" viewBox="0 0 120 150" width="120" height="150">
        <rect x="6" y="6" width="108" height="138" rx="14" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
        <rect x="6" y="6" width="108" height="30" rx="14" fill="var(--accent-color, #3a5bd9)" stroke="#1f2937" stroke-width="4"/>
        <text x="60" y="27" text-anchor="middle" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#ffffff">TO DO</text>
        <circle cx="22" cy="58" r="5" fill="#ef4444"/>
        <line x1="34" y1="58" x2="100" y2="58" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
        <circle cx="22" cy="82" r="5" fill="#f59e0b"/>
        <line x1="34" y1="82" x2="100" y2="82" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
        <circle cx="22" cy="106" r="5" fill="#22c55e"/>
        <line x1="34" y1="106" x2="100" y2="106" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
        <circle cx="22" cy="126" r="5" fill="#94a3b8"/>
        <line x1="34" y1="126" x2="86" y2="126" stroke="#cbd5e1" stroke-width="4" stroke-linecap="round"/>
      </svg>

      <div class="car-part" id="carPart">
        <svg class="rope-svg" viewBox="0 0 60 20" width="60" height="20">
          <path d="M2,10 Q15,2 30,10 T58,10" fill="none" stroke="#1f2937" stroke-width="3" stroke-linecap="round"/>
        </svg>

        <svg class="car-svg" viewBox="0 0 260 170" width="260" height="170">
          <!-- speed lines -->
          <g class="speed-lines" stroke="#94a3b8" stroke-width="4" stroke-linecap="round">
            <line x1="228" y1="70" x2="252" y2="70"/>
            <line x1="232" y1="90" x2="256" y2="90"/>
            <line x1="228" y1="110" x2="250" y2="110"/>
          </g>

          <!-- wheels -->
          <circle class="wheel" cx="70" cy="140" r="22" fill="#1f2937"/>
          <circle cx="70" cy="140" r="9" fill="#cbd5e1"/>
          <circle class="wheel" cx="190" cy="140" r="22" fill="#1f2937"/>
          <circle cx="190" cy="140" r="9" fill="#cbd5e1"/>

          <!-- car body -->
          <path class="car-body"
            d="M22,120 Q18,75 68,70 L92,38 Q102,26 122,26 L172,26 Q188,26 195,42 L206,70
               Q246,74 246,120 Q246,132 234,132 L34,132 Q22,132 22,120 Z"
            fill="var(--car-color, #3a5bd9)" stroke="#1f2937" stroke-width="5"/>

          <!-- windshield -->
          <path d="M104,40 L166,40 Q176,40 179,50 L184,70 L100,70 L95,50 Q98,40 104,40 Z"
                fill="#bfe3ff" stroke="#1f2937" stroke-width="4"/>

          <!-- door line + handle -->
          <line x1="150" y1="80" x2="150" y2="130" stroke="#1f2937" stroke-width="3" opacity="0.35"/>
          <rect x="128" y="95" width="16" height="6" rx="3" fill="#1f2937" opacity="0.35"/>

          <!-- cat -->
          <g class="cat">
            <!-- ears -->
            <polygon points="98,30 92,6 116,24" fill="var(--car-color, #3a5bd9)" stroke="#1f2937" stroke-width="3"/>
            <polygon points="150,30 158,6 134,24" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
            <polygon points="102,26 100,14 112,23" fill="#ffc9d9"/>
            <polygon points="146,26 148,14 138,23" fill="#ffc9d9"/>

            <!-- head -->
            <circle cx="124" cy="46" r="30" fill="#ffffff" stroke="#1f2937" stroke-width="4"/>
            <path d="M124,20 Q150,20 154,44 Q150,30 124,30 Z" fill="var(--car-color, #3a5bd9)"/>

            <!-- blush -->
            <circle cx="104" cy="54" r="5" fill="#ffc9d9" opacity="0.9"/>
            <circle cx="144" cy="54" r="5" fill="#ffc9d9" opacity="0.9"/>

            <!-- eyes -->
            <circle cx="112" cy="46" r="4.5" fill="#1f2937"/>
            <circle cx="110.5" cy="44.5" r="1.4" fill="#ffffff"/>
            <circle cx="136" cy="46" r="4.5" fill="#1f2937"/>
            <circle cx="134.5" cy="44.5" r="1.4" fill="#ffffff"/>

            <!-- mouth -->
            <path d="M118,58 Q124,63 130,58" fill="none" stroke="#1f2937" stroke-width="2.5" stroke-linecap="round"/>

            <!-- whiskers -->
            <line x1="86" y1="50" x2="70" y2="46" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
            <line x1="86" y1="56" x2="70" y2="58" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
            <line x1="162" y1="50" x2="178" y2="46" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>
            <line x1="162" y1="56" x2="178" y2="58" stroke="#1f2937" stroke-width="2" stroke-linecap="round"/>

            <!-- paw on wheel -->
            <circle cx="124" cy="88" r="9" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
          </g>

          <!-- speech bubble -->
          <g class="speech-bubble">
            <circle cx="72" cy="24" r="13" fill="#ffffff" stroke="#1f2937" stroke-width="3"/>
            <circle cx="88" cy="38" r="4" fill="#ffffff" stroke="#1f2937" stroke-width="2.5"/>
            <path d="M65,24 Q72,15 79,24 Q79,31 72,31 Q65,31 65,24 Z" fill="#ef4444"/>
          </g>
        </svg>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
